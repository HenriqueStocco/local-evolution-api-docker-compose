networks:
  evo_local:
    driver: bridge

volumes:
  postgres_evo_local:
  evolution_instances_local:
  redis_evo_local:

services:
  postgres-evo:
    image: postgres:17-alpine
    container_name: postgres-evo-local
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - evo_local
    ports:
      - "5543:5432"
    environment:
      POSTGRES_USER: ${EVO_DB_USER:-evolution}
      POSTGRES_PASSWORD: ${EVO_DB_PASSWORD:-evolution}
      POSTGRES_DB: ${EVO_DB_NAME:-evolution}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    volumes:
      - postgres_evo_local:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=16MB
      - -c
      - max_connections=30
      - -c
      - effective_cache_size=48MB
      - -c
      - maintenance_work_mem=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=2MB
      - -c
      - work_mem=1MB
      - -c
      - log_timezone=America/Sao_Paulo
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96M
        reservations:
          cpus: "0.05"
          memory: 48M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${EVO_DB_USER:-evolution} -d ${EVO_DB_NAME:-evolution}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis-evo:
    image: redis:7-alpine
    container_name: redis-evo-local
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - evo_local
    command:
      - redis-server
      - --maxmemory
      - 25mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
      - --hz
      - "10"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M
        reservations:
          cpus: "0.05"
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    pull_policy: always
    container_name: evolution-api-local
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - evo_local
    ports:
      - "8082:8080"
    environment:
      TZ: America/Sao_Paulo
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      SERVER_URL: "http://localhost:8082"
      AUTHENTICATION_API_KEY: ${EVO_API_KEY:-changeme}
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1042184945"
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET, POST"
      CORS_CREDENTIALS: "false"
      LANGUAGE: pt-BR
      # Banco de dados (PostgreSQL dedicado ao Evolution)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres-evo:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      # Salvar apenas dados de instância — sem histórico de mensagens (economiza disco e memória)
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      # Cache Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis-evo:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # Sessão WhatsApp — não deletar instância por inatividade
      DEL_INSTANCE: "false"
      LOG_LEVEL: ERROR
      LOG_COLOR: "false"
      LOG_BAILEYS: "error"
      CONFIG_SESSION_PHONE_CLIENT: "Test"
      CONFIG_SESSION_PHONE_NAME: "Firefox"
      QRCODE_LIMIT: 1000
      # Desabilita integrações não utilizadas
      RABBITMQ_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      S3_ENABLED: "false"
      OPENAI_ENABLED: "false"
      DIFY_ENABLED: "false"
      CHATWOOT_ENABLED: "false"
      TELEMETRY: "false"
    volumes:
      - evolution_instances_local:/evolution/instances
    depends_on:
      postgres-evo:
        condition: service_healthy
      redis-evo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 320M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
