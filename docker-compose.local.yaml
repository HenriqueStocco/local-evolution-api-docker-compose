networks:
  evo_local:
    driver: bridge

volumes:
  postgres_evo_local:
  evolution_instances_local:
  redis_evo_local:

services:
  postgres-evo:
    image: postgres:17-alpine
    container_name: postgres-evo-local
    restart: unless-stopped
    networks:
      - evo_local
    ports:
      - "5543:5432"
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_USER: ${EVO_DB_USER:-evolution}
      POSTGRES_PASSWORD: ${EVO_DB_PASSWORD:-evolution}
      POSTGRES_DB: ${EVO_DB_NAME:-evolution}
    volumes:
      - postgres_evo_local:/var/lib/postgresql/data

  redis-evo:
    image: redis:7-alpine
    container_name: redis-evo-local
    restart: unless-stopped
    networks:
      - evo_local
    volumes:
      - redis_evo_local:/data

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api-local
    restart: unless-stopped
    networks:
      - evo_local
    ports:
      - "8080:8080"
    environment:
      TZ: America/Sao_Paulo
      SERVER_URL: ${EVO_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVO_API_KEY:-changeme}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVO_DB_USER:-evolution}:${EVO_DB_PASSWORD:-evolution}@postgres-evo:5432/${EVO_DB_NAME:-evolution}?schema=public
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis-evo:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_VERSION: 2.3000.1042184945
    volumes:
      - evolution_instances_local:/evolution/instances
    depends_on:
      - postgres-evo
      - redis-evo
